<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – JobTrackerPro</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        body { flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="brand">🚀 JobTrackerPro</div>
        <div class="sub">Create your free account</div>

        <div id="msg"></div>

        <form action="register" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required autofocus>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 6 characters" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-dark btn-full" style="margin-top:8px;">Create Account</button>
        </form>

        <div class="auth-links" style="margin-top:20px;">
            Already have an account? <a href="login.html">Sign in</a>
            &nbsp;|&nbsp; <a href="index.html">← Home</a>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = document.getElementById('msg');
        if (p.get('error')) m.innerHTML = '<div class="alert alert-error">' + decodeURIComponent(p.get('error')) + '</div>';
    </script>
</body>
</html>
