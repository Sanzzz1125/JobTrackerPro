<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTrackerPro</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        body { flex-direction: column; align-items: center; justify-content: center; }
        .landing { text-align: center; padding: 20px; width: 100%; max-width: 460px; }
        .logo { font-size: 52px; margin-bottom: 12px; }
        h1   { font-size: 32px; font-weight: 700; color: #111827; margin-bottom: 8px; }
        .tagline { color: #6b7280; font-size: 16px; margin-bottom: 36px; }
        .landing-card {
            background: white; border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); padding: 40px;
        }
        .landing-card h2 { font-size: 20px; color: #111827; margin-bottom: 6px; }
        .landing-card p  { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .btn-landing {
            display: block; width: 100%; padding: 13px;
            border-radius: 10px; font-size: 15px; font-weight: 600;
            text-decoration: none; margin-bottom: 12px; text-align: center;
            transition: opacity 0.15s;
        }
        .btn-landing:hover { opacity: 0.85; }
        .bl-dark  { background: #111827; color: white; }
        .bl-light { background: #f1f5f9; color: #111827; border: 1px solid #e2e8f0; }
        .bl-admin { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .divider  {
            display: flex; align-items: center; gap: 10px;
            margin: 18px 0; color: #9ca3af; font-size: 13px;
        }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
        footer { margin-top: 24px; color: #9ca3af; font-size: 13px; }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo">🚀</div>
        <h1>JobTrackerPro</h1>
        <p class="tagline">Track every application. Land your dream job.</p>

        <div class="landing-card">
            <h2>Welcome</h2>
            <p>Sign in or create an account to start tracking your job applications.</p>

            <a href="login.html" class="btn-landing bl-dark">Sign In</a>
            <a href="register.html" class="btn-landing bl-light">Create Account</a>

            <div class="divider">Admin Access</div>

            <a href="login.html" class="btn-landing bl-admin">⚙ Admin Login</a>
            <p style="font-size:12px;color:#9ca3af;margin-top:6px;">
                Admin uses the same login — redirected automatically.
            </p>
        </div>

        <footer>© 2026 JobTrackerPro. All rights reserved.</footer>
    </div>
</body>
</html>
